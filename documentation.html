<section id="readme-content" style="padding:2em; max-width:900px; margin:auto; background:white; border-radius:8px;">
  Loading README...
</section>

<script>
fetch('README.md')
  .then(response => response.text())
  .then(text => {
    document.getElementById('readme-content').innerHTML = marked.parse(text);
  })
  .catch(err => {
    document.getElementById('readme-content').innerHTML = 'Failed to load README.md';
    console.error(err);
  });
</script>
